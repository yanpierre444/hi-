        body {

        }

        }
    </style>

</head>

<body> Página 1 <h1>Mundial 2026</h1>
    <p id="mensagem">Bem-vindo ao jogo!</p>

    <button class="botao" onclick="acabarjogo()">Fim de jogo!</button>

    <script> // Variável para guardar os golos var

    function animarjogo() {
        document.getElementById("Força Portugal! Rumo à vitória").innerHTML
       // alert("Força Portugal! Rumo à vitória");//
    }

    totalGolos = 0; // Função 1: Mostra uma janela pop-up 

    function mostrarAlerta() {
        alert("O jogo vai começar!");       
     } // Função 2: Aumenta o número de golos no ecrã

    function marcarGolo() {

     }

     }
